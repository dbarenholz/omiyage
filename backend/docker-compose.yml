services:
  db:
    image: postgres:18-alpine
    container_name: omiyage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omiyage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omiyage}
      POSTGRES_DB: ${POSTGRES_DB:-omiyage}
    ports:
      - "5432:5432"
    volumes:
      - omiyage-db-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omiyage} -d ${POSTGRES_DB:-omiyage}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: omiyage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - omiyage-minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: omiyage-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-omiyage}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  omiyage-db-data:
  omiyage-minio-data:
