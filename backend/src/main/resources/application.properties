# Server
# Set SERVER_PORT via the container environment.
server.port=${SERVER_PORT:8080}
# Set SERVER_SERVLET_CONTEXT_PATH via the container environment.
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db:5432/${POSTGRES_DB:omiyage}}
spring.datasource.username=${DATABASE_USERNAME:${POSTGRES_USER:omiyage}}
spring.datasource.password=${DATABASE_PASSWORD:${POSTGRES_PASSWORD:omiyage}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS – set CORS_ALLOWED_ORIGINS to a comma-separated list of origins in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Jackson – serialize Instants as ISO-8601 strings
spring.jackson.serialization.write-dates-as-timestamps=false

# Object storage (MinIO / S3-compatible)
storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
storage.minio.bucket=${MINIO_BUCKET:omiyage-images}
storage.minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}

# Inactive account cleanup (minutes before a never-logged-in account is deleted)
app.cleanup.inactive-account-minutes=${CLEANUP_INACTIVE_ACCOUNT_MINUTES:15}
